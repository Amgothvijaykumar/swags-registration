<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GFG Swags Registration</title>
  <meta name="description"
    content="Register for your GeeksforGeeks swags by submitting your roll number, name, and preferred size." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gfg-green: #2f8d46;
      --gfg-dark: #1a5e2d;
      --gfg-light: #e8f5e9;
      --accent: #43b560;
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --error: #f85149;
      --warning-bg: #3d1c1c;
      --success: #3fb950;
      --success-bg: #0d2119;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background-image: radial-gradient(ellipse at 20% 10%, rgba(47, 141, 70, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(67, 181, 96, 0.08) 0%, transparent 60%);
    }

    /* ── Header ── */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .logo-badge {
      background: var(--gfg-green);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 800;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      letter-spacing: 0.5px;
      box-shadow: 0 0 20px rgba(47, 141, 70, 0.5);
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #43b560, #a3e4b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 32px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(67, 181, 96, 0.06);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"],
    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(67, 181, 96, 0.15);
    }

    input[type="text"]::placeholder {
      color: var(--muted);
    }

    select option {
      background: var(--surface2);
    }

    /* Size grid */
    .size-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .size-option input {
      display: none;
    }

    .size-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 4px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0;
      text-transform: none;
      transition: all 0.18s;
    }

    .size-option input:checked+label {
      background: rgba(47, 141, 70, 0.2);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px rgba(67, 181, 96, 0.2);
    }

    .size-option label:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Submit ── */
    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gfg-green), var(--accent));
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(47, 141, 70, 0.35);
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(47, 141, 70, 0.45);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Alert banners ── */
    .alert {
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 0.88rem;
      font-weight: 500;
      margin-top: 18px;
      display: none;
      align-items: flex-start;
      gap: 10px;
      animation: fadeIn 0.3s ease both;
      line-height: 1.5;
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .alert.show {
      display: flex;
    }

    .alert-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .alert-success {
      background: var(--success-bg);
      border: 1px solid rgba(63, 185, 80, 0.35);
      color: var(--success);
    }

    .alert-error {
      background: var(--warning-bg);
      border: 1px solid rgba(248, 81, 73, 0.35);
      color: var(--error);
    }

    /* ── Success screen ── */
    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 16px 0 8px;
      animation: fadeUp 0.4s ease both;
    }

    .success-screen.show {
      display: flex;
    }

    .checkmark {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(47, 141, 70, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      margin-bottom: 20px;
      box-shadow: 0 0 30px rgba(67, 181, 96, 0.3);
    }

    .success-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--success);
      margin-bottom: 8px;
    }

    .success-detail {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .success-detail span {
      color: var(--text);
      font-weight: 600;
    }

    .register-again {
      margin-top: 24px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      padding: 8px 18px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .register-again:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 20px;
      }

      .size-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>

  <div class="logo-row">
    <div class="logo-badge">GFG</div>
    <div class="site-title">Swags Registration</div>
  </div>
  <p class="subtitle">GeeksforGeeks Student Chapter</p>

  <div class="card" id="main-card">

    <!-- Registration Form -->
    <div id="form-view">
      <div class="card-header">Claim your free Swags 🎁</div>
      <p class="card-desc">Fill in your details below. Each roll number can only be registered once.</p>

      <form id="reg-form" novalidate>

        <div class="form-group">
          <label for="rollNumber">Roll Number</label>
          <input type="text" id="rollNumber" placeholder="e.g. 22BCE1234" autocomplete="off" required />
        </div>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="e.g. Vijay Kumar" autocomplete="off" required />
        </div>

        <div class="form-group">
          <label for="year">Year of Study</label>
          <select id="year" required>
            <option value="" disabled selected>Select your year</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
            <option value="4th Year">4th Year</option>
          </select>
        </div>

        <div class="form-group">
          <label>T-Shirt Size</label>
          <div class="size-grid">
            <div class="size-option"><input type="radio" name="size" id="sS" value="S" /><label for="sS">S</label></div>
            <div class="size-option"><input type="radio" name="size" id="sM" value="M" /><label for="sM">M</label></div>
            <div class="size-option"><input type="radio" name="size" id="sL" value="L" /><label for="sL">L</label></div>
            <div class="size-option"><input type="radio" name="size" id="sXL" value="XL" /><label for="sXL">XL</label>
            </div>
          </div>
        </div>

        <button class="btn" type="submit" id="submit-btn">Register Now</button>

        <div class="alert alert-success" id="alert-success" role="alert">
          <span class="alert-icon">✅</span>
          <span id="alert-success-msg"></span>
        </div>

        <div class="alert alert-error" id="alert-error" role="alert">
          <span class="alert-icon">⚠️</span>
          <span id="alert-error-msg"></span>
        </div>

      </form>
    </div>

    <!-- Success Screen -->
    <div class="success-screen" id="success-view">
      <div class="checkmark">🎉</div>
      <div class="success-title">You're registered!</div>
      <p class="success-detail">Roll Number: <span id="s-roll"></span></p>
      <p class="success-detail">Name: <span id="s-name"></span></p>
      <p class="success-detail">Year: <span id="s-year"></span></p>
      <p class="success-detail">T-Shirt Size: <span id="s-size"></span></p>
      <button class="register-again" onclick="resetForm()">Register another person</button>
    </div>

  </div>

  <p class="footer">© 2025 GFG Student Chapter &nbsp;·&nbsp; All data is securely stored</p>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────────────
    // IMPORTANT: Replace this with your deployed Apps Script Web App URL
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuFbncyGkiCdxEu1HHGyNUvX_KrN4JANNxSYYuWWEt-VJIeB12M-DtwpSHBr8yEq9V9A/exec";
    // ────────────────────────────────────────────────────────────────────────

    const form = document.getElementById("reg-form");
    const submitBtn = document.getElementById("submit-btn");
    const alertSuccess = document.getElementById("alert-success");
    const alertError = document.getElementById("alert-error");
    const alertSuccessMsg = document.getElementById("alert-success-msg");
    const alertErrorMsg = document.getElementById("alert-error-msg");

    function clearAlerts() {
      alertSuccess.classList.remove("show");
      alertError.classList.remove("show");
    }

    function showError(msg) {
      alertErrorMsg.textContent = msg;
      alertError.classList.add("show");
      alertSuccess.classList.remove("show");
    }

    function resetForm() {
      form.reset();
      clearAlerts();
      document.getElementById("form-view").style.display = "";
      document.getElementById("success-view").classList.remove("show");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearAlerts();

      const rollNumber = document.getElementById("rollNumber").value.trim();
      const name = document.getElementById("name").value.trim();
      const year = document.getElementById("year").value;
      const sizeEl = document.querySelector('input[name="size"]:checked');

      // Client-side validation
      if (!rollNumber) return showError("Please enter your roll number.");
      if (!name) return showError("Please enter your full name.");
      if (!year) return showError("Please select your year of study.");
      if (!sizeEl) return showError("Please select a t-shirt size.");

      if (APPS_SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
        return showError("⚙️ Setup incomplete: Please add the Apps Script URL to index.html (see README).");
      }

      const size = sizeEl.value;

      // Loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Submitting…';

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ rollNumber, name, year, size }),
        });

        const result = await response.json();

        if (result.status === "success") {
          // Show success screen
          document.getElementById("s-roll").textContent = rollNumber;
          document.getElementById("s-name").textContent = name;
          document.getElementById("s-year").textContent = year;
          document.getElementById("s-size").textContent = size;
          document.getElementById("form-view").style.display = "none";
          document.getElementById("success-view").classList.add("show");
        } else if (result.status === "duplicate") {
          showError("Roll number " + rollNumber + " is already registered. Each roll number can only register once.");
        } else {
          showError(result.message || "Something went wrong. Please try again.");
        }
      } catch (err) {
        showError("Network error. Please check your connection and try again.");
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Register Now";
      }
    });
  </script>
</body>

</html>
